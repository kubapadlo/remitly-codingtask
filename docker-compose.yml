version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockmarket
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app1:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/stockmarket
      PORT: 3000
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  app2:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/stockmarket
      PORT: 3000
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - app1
      - app2
    restart: unless-stopped