events {}

http {
  upstream backend {
    server app1:3000;
    server app2:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass         http://backend;
      proxy_read_timeout 5s;
      proxy_connect_timeout 2s;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }
}